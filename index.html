<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#1a1815">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="训练计划">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练计划 - 膝盖调整版</title>
<style>
/* ============================================
   Design: "Rehab Studio" — organic warmth meets functional minimalism
   Palette: warm earth tones with amber accents
   ============================================ */

/* ---------- Reset & Base ---------- */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

:root {
  --bg-deep:    oklch(0.14 0.015 75);
  --bg-surface: oklch(0.19 0.012 75);
  --bg-raised:  oklch(0.22 0.012 75);
  --bg-hover:   oklch(0.25 0.012 75);
  --text-primary:   oklch(0.92 0.005 85);
  --text-secondary: oklch(0.62 0.008 85);
  --text-muted:     oklch(0.45 0.008 85);
  --accent:         oklch(0.68 0.14 60);
  --accent-soft:    oklch(0.55 0.08 60);
  --accent-glow:    oklch(0.68 0.14 60 / 0.18);
  --success:        oklch(0.55 0.10 155);
  --success-bg:     oklch(0.55 0.10 155 / 0.12);
  --danger:         oklch(0.58 0.16 25);
  --danger-bg:      oklch(0.58 0.16 25 / 0.10);
  --warn:           oklch(0.62 0.12 80);
  --info:           oklch(0.56 0.06 220);
  --separator:      oklch(0.30 0.008 85 / 0.4);
  --shadow-sm:      0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md:      0 4px 12px oklch(0 0 0 / 0.4);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --font-mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---------- Typography ---------- */
h1 { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 700; letter-spacing: -0.01em; color: oklch(0.95 0.005 85) }
.tab { font-size: 0.82rem; font-weight: 500; letter-spacing: -0.005em }
.card-title .name { font-size: clamp(1.05rem, 3.5vw, 1.25rem); font-weight: 600; letter-spacing: -0.01em }
.card-timer { font-family: var(--font-mono); font-weight: 600; font-variant-numeric: tabular-nums }
.tips { font-size: 0.92rem; line-height: 1.75; color: var(--text-secondary); transition: font-size 0.3s ease }
.exercise-card.active .tips { font-size: clamp(1.05rem, 3.5vw, 1.25rem) }

/* ---------- Header & Tab Bar ---------- */
.header {
  padding: clamp(16px, 3vw, 24px) 16px 10px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-deep);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header h1 { margin-bottom: 12px }

.tab-bar {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
}
.tab {
  padding: 7px 16px;
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  border: none;
  user-select: none;
}
.tab:hover { background: var(--bg-hover); color: var(--text-primary) }
.tab.active { background: var(--accent); color: oklch(0.12 0.01 75); font-weight: 600; box-shadow: 0 2px 8px var(--accent-glow) }

/* ---------- Progress Bar ---------- */
.progress-bar {
  height: 4px; background: var(--bg-surface); position: relative;
}
.progress-bar .fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 0 2px 2px 0;
}

/* ---------- Warning Bar ---------- */
.warning-bar {
  background: var(--danger-bg);
  padding: 10px 16px; font-size: 0.78rem;
  color: var(--danger);
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid oklch(0.58 0.16 25 / 0.15);
}
.warning-bar .icon { font-size: 1.1rem }

/* ---------- Exercise List ---------- */
.exercise-list {
  padding: 16px 16px 200px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Cards — de-emphasized: lighter look, spacing-based grouping */
.exercise-card {
  background: var(--bg-surface);
  border-radius: var(--radius-md);
  overflow: hidden;
  position: relative;
  transition: background 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
  box-shadow: var(--shadow-sm);
}
.exercise-card::before {
  content: '';
  position: absolute; left: 0; top: 12px; bottom: 12px;
  width: 3px; border-radius: 0 3px 3px 0;
  background: transparent;
  transition: background 0.3s ease;
}
.exercise-card.active { background: var(--bg-raised); box-shadow: var(--shadow-md) }
.exercise-card.active::before { background: var(--accent) }
.exercise-card.done { opacity: 0.55 }
.exercise-card.done .card-header { background: transparent }
.exercise-card.done::before { background: var(--success) }

/* Card header — no top border, cleaner */
.card-header {
  display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 12px;
  transition: background 0.15s ease;
}
.card-header:active { background: oklch(0.22 0.012 75 / 0.6) }

/* Phase tag — pill with color-coded backgrounds */
.phase-tag {
  font-size: 0.75rem; padding: 3px 10px; border-radius: var(--radius-full);
  font-weight: 600; white-space: nowrap; letter-spacing: 0.02em;
}
.phase-tag.热身 { background: oklch(0.45 0.06 210 / 0.2); color: oklch(0.7 0.06 210) }
.phase-tag.正式 { background: oklch(0.68 0.14 60 / 0.15); color: var(--accent) }
.phase-tag.循环 { background: oklch(0.68 0.14 60 / 0.15); color: var(--accent) }
.phase-tag.拉伸 { background: oklch(0.55 0.10 155 / 0.2); color: var(--success) }
.phase-tag.休息 { background: oklch(0.62 0.12 80 / 0.2); color: var(--warn) }

.card-title { flex: 1; min-width: 0 }
.card-title .name { color: var(--text-primary) }
.card-title .meta { font-size: 0.85rem; color: var(--text-secondary); margin-top: 2px }
.card-title .meta span { margin-right: 10px }

.card-timer { font-size: clamp(1.6rem, 5vw, 2.2rem); color: var(--accent); min-width: 70px; text-align: right }
.card-timer.counting { animation: timerPulse 1s ease-in-out infinite }
.card-timer.set-done { color: var(--success) }
@keyframes timerPulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.55 } }

.set-indicator { font-size: 0.82rem; color: var(--warn); margin-top: 2px; font-weight: 500 }

.expand-icon { color: var(--text-muted); font-size: 0.7rem; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1) }
.exercise-card.expanded .expand-icon { transform: rotate(180deg) }

/* Detail */
.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1) }
.exercise-card.expanded .card-detail { max-height: 600px }
.detail-content { padding: 0 16px 18px }
.weight-info {
  background: var(--bg-raised); border-radius: var(--radius-sm);
  padding: 10px 14px; margin-bottom: 12px; font-size: 0.95rem; color: var(--info);
  box-shadow: var(--shadow-sm);
}
.demo-link {
  display: inline-block; margin-top: 10px; padding: 8px 16px;
  border-radius: var(--radius-sm); background: var(--bg-raised);
  color: var(--info); font-size: 0.85rem; text-decoration: none;
  transition: background 0.2s ease;
}
.demo-link:hover { background: var(--bg-hover) }

/* ---------- Control Bar ---------- */
.control-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, transparent, var(--bg-deep) 25%);
  padding: 24px 16px 20px; z-index: 100;
}
.control-inner {
  background: var(--bg-raised); border-radius: var(--radius-lg);
  padding: 14px; display: flex; align-items: center; justify-content: center;
  gap: 14px; max-width: 480px; margin: 0 auto;
  box-shadow: var(--shadow-md);
}

.btn {
  padding: 12px 20px; border-radius: var(--radius-md); border: none;
  font-size: 0.88rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease, opacity 0.2s ease;
  user-select: none;
}
.btn:active { transform: scale(0.97) }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none }
.btn-prev, .btn-next { background: var(--bg-surface); color: var(--text-secondary) }
.btn-prev:hover:not(:disabled), .btn-next:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary) }
.btn-start { background: var(--accent); color: oklch(0.12 0.01 75); min-width: 110px }
.btn-start:hover { background: oklch(0.62 0.14 60) }
.btn-start.running { background: oklch(0.45 0.08 60); color: var(--text-primary) }
.btn-skip { background: transparent; color: var(--text-muted); font-size: 0.75rem; padding: 6px 10px; border: none; cursor: pointer; transition: color 0.2s ease }
.btn-skip:hover { color: var(--accent) }

/* Session info */
.session-info { text-align: center; margin-bottom: 8px }
.session-timer { font-size: 1.2rem; font-weight: 600; color: var(--text-secondary); font-variant-numeric: tabular-nums; font-family: var(--font-mono) }
.session-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em }

/* ---------- Rest Overlay ---------- */
.rest-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: oklch(0.12 0.01 75 / 0.95); z-index: 200;
  justify-content: center; align-items: center; flex-direction: column;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.rest-overlay.show { display: flex }
.rest-text { font-size: 1rem; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.02em }
.rest-countdown { font-size: clamp(4rem, 12vw, 6rem); font-weight: 700; color: var(--accent); font-family: var(--font-mono); font-variant-numeric: tabular-nums; line-height: 1 }
.rest-adjust { display: flex; align-items: center; gap: 20px; margin-top: 24px }
.rest-adjust button {
  width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--accent-soft);
  background: transparent; color: var(--accent); font-size: 1rem; cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease;
}
.rest-adjust button:hover { background: var(--accent); color: oklch(0.12 0.01 75) }
.rest-adjust .adj-label { color: var(--text-muted); font-size: 0.78rem }
.rest-skip {
  margin-top: 28px; padding: 10px 28px; border-radius: var(--radius-full);
  border: 2px solid var(--accent-soft); background: transparent;
  color: var(--accent); font-size: 0.9rem; cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease;
}
.rest-skip:hover { background: var(--accent); color: oklch(0.12 0.01 75) }

/* ---------- Top Buttons ---------- */
.top-btns {
  position: fixed; top: 16px; right: 16px; z-index: 101;
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end;
}
.top-btn {
  background: var(--bg-surface); border: none; border-radius: var(--radius-full);
  padding: 6px 14px; color: var(--text-secondary); font-size: 0.75rem;
  cursor: pointer; transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  font-weight: 500;
}
.top-btn:hover { background: var(--bg-hover); color: var(--text-primary); box-shadow: var(--shadow-sm) }

/* ---------- Modals ---------- */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: oklch(0.08 0.01 75 / 0.88); z-index: 300;
  justify-content: center; align-items: center; padding: 20px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.modal-overlay.show { display: flex }
.modal-content {
  background: var(--bg-surface); border-radius: var(--radius-lg);
  padding: 24px; max-width: 480px; width: 100%; max-height: 80vh;
  overflow-y: auto; box-shadow: 0 8px 32px oklch(0 0 0 / 0.5);
}
.modal-content h2 { font-size: 1.05rem; margin-bottom: 16px; font-weight: 700; letter-spacing: -0.01em }
.modal-close {
  margin-top: 16px; padding: 10px 24px; border-radius: var(--radius-md);
  border: none; background: var(--accent); color: oklch(0.12 0.01 75);
  cursor: pointer; font-size: 0.85rem; font-weight: 600;
  transition: background 0.2s ease;
}
.modal-close:hover { background: oklch(0.62 0.14 60) }

/* Notes modal */
.notes-content h2 { color: var(--danger) }
.notes-content table { width: 100%; border-collapse: collapse; font-size: 0.82rem }
.notes-content td { padding: 8px; border-bottom: 1px solid var(--separator); color: var(--text-secondary) }
.notes-content td:first-child { color: var(--danger); font-weight: 600; width: 90px; white-space: nowrap }

/* Complete modal */
.complete-content h2 { color: var(--success) }
.complete-content .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0 }
.complete-content .stat-box { background: var(--bg-raised); border-radius: var(--radius-md); padding: 16px; text-align: center; box-shadow: var(--shadow-sm) }
.complete-content .stat-box .val { font-size: 1.6rem; font-weight: 700; color: var(--accent); font-family: var(--font-mono) }
.complete-content .stat-box .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em }
.complete-content .log-section { margin-top: 16px }
.complete-content .log-section label { font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 6px }
.complete-content .log-section textarea {
  width: 100%; background: var(--bg-raised); border: none; border-radius: var(--radius-sm);
  padding: 12px; color: var(--text-primary); font-size: 0.85rem; resize: vertical;
  min-height: 80px; font-family: inherit; transition: box-shadow 0.2s ease;
}
.complete-content .log-section textarea:focus { outline: none; box-shadow: 0 0 0 2px var(--accent-soft) }
.complete-content { max-width: 640px }
.completion-form-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px;
  margin-top: 14px;
}
.completion-field { display: flex; flex-direction: column; gap: 6px }
.completion-field.full { grid-column: 1 / -1 }
.completion-field label { font-size: 0.75rem; color: var(--text-muted) }
.completion-field input, .completion-field select, .completion-field textarea {
  width: 100%; background: var(--bg-raised); color: var(--text-primary);
  border: 1px solid transparent; border-radius: var(--radius-sm);
  padding: 10px 11px; font: inherit; font-size: 0.84rem;
}
.completion-field textarea { min-height: 72px; resize: vertical }
.completion-field input:focus, .completion-field select:focus, .completion-field textarea:focus {
  outline: none; border-color: var(--accent);
}
.completion-hint { color: var(--text-muted); font-size: 0.74rem; line-height: 1.5; margin-top: 10px }

/* Log modal */
.log-content h2 { color: var(--warn) }
.log-entries { max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px }
.log-entry { background: var(--bg-raised); border-radius: var(--radius-sm); padding: 12px; box-shadow: var(--shadow-sm) }
.log-entry .log-date { font-size: 0.75rem; color: var(--text-muted) }
.log-entry .log-day { font-size: 0.85rem; font-weight: 600; margin: 4px 0 }
.log-entry .log-text { font-size: 0.82rem; color: var(--text-secondary); white-space: pre-wrap }
.log-entry .log-meta { font-size: 0.74rem; color: var(--text-muted); line-height: 1.5; margin-top: 6px }
.log-empty { text-align: center; color: var(--text-muted); padding: 30px; font-size: 0.85rem }

/* Editor modal */
.editor-content h2 { color: oklch(0.62 0.12 320) }
.editor-content .plan-name {
  background: var(--bg-raised); border: none; border-radius: var(--radius-sm);
  padding: 10px 12px; color: var(--text-primary); font-size: 0.9rem;
  width: 100%; margin-bottom: 12px; font-family: inherit;
  transition: box-shadow 0.2s ease;
}
.editor-content .plan-name:focus { outline: none; box-shadow: 0 0 0 2px var(--accent-soft) }
.editor-content .day-list { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px }
.editor-content .day-item { background: var(--bg-raised); border-radius: var(--radius-sm); padding: 12px; box-shadow: var(--shadow-sm) }
.editor-content .day-item .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }
.editor-content .day-item .day-name { font-size: 0.95rem; font-weight: 600 }
.editor-content .small-btn {
  padding: 4px 12px; border-radius: var(--radius-full); border: none;
  background: var(--bg-surface); color: var(--text-secondary); font-size: 0.75rem;
  cursor: pointer; transition: background 0.2s ease, color 0.2s ease;
}
.editor-content .small-btn:hover { background: var(--bg-hover); color: var(--text-primary) }
.editor-content .small-btn.danger { color: var(--danger) }
.editor-content .small-btn.danger:hover { background: var(--danger-bg); color: var(--danger) }
.editor-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px }
.editor-actions .modal-close { margin-top: 0 }

/* Custom workout page */
.custom-builder {
  width: min(760px, 100%); margin: 0 auto;
  display: flex; flex-direction: column; gap: 12px;
}
.custom-intro {
  background: var(--bg-surface); border-radius: var(--radius-md);
  padding: 16px; color: var(--text-secondary); box-shadow: var(--shadow-sm);
}
.custom-intro h2 { color: var(--text-primary); font-size: 1.05rem; margin-bottom: 6px }
.custom-intro p { font-size: 0.82rem; line-height: 1.6 }
.custom-row {
  background: var(--bg-surface); border-radius: var(--radius-md);
  padding: 14px; box-shadow: var(--shadow-sm);
}
.custom-row-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 12px;
}
.custom-row-title { font-size: 0.82rem; color: var(--text-muted); font-weight: 600 }
.custom-remove {
  border: none; background: var(--danger-bg); color: var(--danger);
  border-radius: var(--radius-full); padding: 5px 12px; cursor: pointer;
}
.custom-fields {
  display: grid; grid-template-columns: minmax(180px, 2fr) repeat(3, 1fr); gap: 10px;
}
.custom-field { display: flex; flex-direction: column; gap: 6px }
.custom-field label { font-size: 0.75rem; color: var(--text-muted) }
.custom-field select, .custom-field input {
  width: 100%; background: var(--bg-raised); color: var(--text-primary);
  border: 1px solid transparent; border-radius: var(--radius-sm);
  padding: 10px 11px; font: inherit; font-size: 0.86rem;
}
.custom-field select:focus, .custom-field input:focus {
  outline: none; border-color: var(--accent);
}
.custom-name-field { margin-top: 10px }
.custom-actions {
  position: sticky; bottom: 156px; z-index: 20;
  display: flex; gap: 8px; flex-wrap: wrap;
  background: linear-gradient(180deg, transparent, var(--bg-deep) 28%);
  padding: 22px 0 8px;
}
.custom-primary, .custom-secondary {
  border: none; border-radius: var(--radius-md); padding: 11px 16px;
  cursor: pointer; font-weight: 600; font-size: 0.85rem;
}
.custom-primary { background: var(--accent); color: oklch(0.12 0.01 75) }
.custom-secondary { background: var(--bg-raised); color: var(--text-secondary) }
.custom-empty {
  text-align: center; padding: 30px 16px; color: var(--text-muted);
  border: 1px dashed var(--separator); border-radius: var(--radius-md);
}
.custom-run-toolbar {
  width: min(760px, 100%); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 12px 14px; background: var(--bg-surface);
  border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
}
.custom-run-toolbar span { color: var(--text-secondary); font-size: 0.82rem }
.control-bar.custom-hidden { display: none }

/* ---------- Trend Chart ---------- */
.trend-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--separator) }
.trend-section h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600 }
.trend-section canvas { width: 100%; max-height: 220px; border-radius: var(--radius-sm); background: var(--bg-deep) }
.trend-legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; font-size: 0.75rem; color: var(--text-muted) }
.trend-legend span { display: flex; align-items: center; gap: 4px }
.trend-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50% }
.trend-legend .dot.dur { background: var(--info) }
.trend-legend .dot.cnt { background: var(--warn) }
.trend-empty { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 20px }
.log-content { max-width: 520px !important }

/* ---------- PWA Install Hint ---------- */
.install-hint {
  display: none; position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  z-index: 150; background: var(--bg-raised); border-radius: var(--radius-full);
  padding: 10px 22px; color: var(--accent); font-size: 0.85rem; cursor: pointer;
  white-space: nowrap; box-shadow: var(--shadow-md); font-weight: 500;
  animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.install-hint.show { display: block }
@keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(16px) } to { opacity: 1; transform: translateX(-50%) translateY(0) } }

/* ---------- Responsive ---------- */
@media (max-width: 600px) {

<script>
// ===== PLAN DATA =====
let PLAN = null;
const PLAN_KEY = 'knee_workout_plan';
const PLAN_VERSION = 6;
const LOG_KEY = 'knee_workout_logs';
const STATE_KEY = 'knee_workout_state';
const DEFAULT_PLAN_URL = 'plans/default.json';
const CUSTOM_DAY = '自定义训练';

// ===== STATE =====
let currentDay = '';
let currentIndex = 0;
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;
let sessionSeconds = 0;
let sessionInterval = null;
let currentSet = 1;
let totalSets = 1;
let exercisePhase = 'work';
let doneExercises = new Set();
let currentRound = 1;
let totalRounds = 1;
let restRemaining = 0;
let restInterval = null;
let restCallback = null;
let customEditing = false;
let customDraft = [];

// ===== AUDIO =====
let audioCtx = null;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function beep(freq=880, ms=150) {
    try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + ms/1000);
    } catch(e) {}
}
function beepSequence(count, freq=880) {
    for (let i = 0; i < count; i++) setTimeout(() => beep(freq, 150), i * 250);
}

// ===== PLAN STORAGE =====
function savePlan() {
    try { localStorage.setItem(PLAN_KEY, JSON.stringify(PLAN)); } catch(e) {}
}
function loadPlan() {
    try {
        const raw = localStorage.getItem(PLAN_KEY);
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
}
async function loadDefaultPlan() {
    try {
        const resp = await fetch(DEFAULT_PLAN_URL);
        if (resp.ok) return await resp.json();
    } catch(e) {}
    return null;
}

// ===== LOG STORAGE (IndexedDB) =====
const DB_NAME = 'knee_workout_db';
const DB_VERSION = 1;
let db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('logs')) d.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
    });
}

async function getLogs() {
    try {
        const d = await openDB();
        return new Promise((resolve) => {
            const tx = d.transaction('logs', 'readonly');
            const store = tx.objectStore('logs');
            const req = store.getAll();
            req.onsuccess = () => {
                const logs = req.result || [];
                logs.sort((a,b) => b.id - a.id);
                resolve(logs.slice(0, 60));
            };
            req.onerror = () => resolve([]);
        });
    } catch(e) { return []; }
}

async function addLog(entry) {
    try {
        const d = await openDB();
        const tx = d.transaction('logs', 'readwrite');
        const store = tx.objectStore('logs');
        store.add(entry);
        const countReq = store.count();
        countReq.onsuccess = () => {
            if (countReq.result > 100) {
                const getAllReq = store.getAll();
                getAllReq.onsuccess = () => {
                    const all = getAllReq.result;
                    all.sort((a,b) => a.id - b.id);
                    const toDelete = all.slice(0, all.length - 100);
                    const delTx = d.transaction('logs', 'readwrite');
                    const delStore = delTx.objectStore('logs');
                    toDelete.forEach(item => delStore.delete(item.id));
                };
            }
        };
        return new Promise(resolve => { tx.oncomplete = () => resolve(); });
    } catch(e) {}
}

// ===== SESSION STATE =====
function saveState() {
    try {
        localStorage.setItem(STATE_KEY, JSON.stringify({
            currentDay, currentIndex, currentSet, totalSets,
            currentRound, totalRounds, exercisePhase,
            doneExercises: Array.from(doneExercises), sessionSeconds,
            timestamp: Date.now()
        }));
    } catch(e) {}
}
function loadState() {
    try {
        const raw = localStorage.getItem(STATE_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (Date.now() - s.timestamp > 4*60*60*1000) { localStorage.removeItem(STATE_KEY); return false; }
        currentDay = s.currentDay; currentIndex = s.currentIndex;
        currentSet = s.currentSet; totalSets = s.totalSets;
        currentRound = s.currentRound || 1; totalRounds = s.totalRounds || 1;
        exercisePhase = s.exercisePhase;
        doneExercises = new Set(s.doneExercises); sessionSeconds = s.sessionSeconds;
        return true;
    } catch(e) { return false; }
}
function clearState() { try { localStorage.removeItem(STATE_KEY); } catch(e) {} }

// ===== HELPERS =====
function getDays() { return PLAN ? Object.keys(PLAN.days) : []; }
function getExercises() { return (PLAN && PLAN.days[currentDay]) ? PLAN.days[currentDay].exercises : []; }
function getInitialSeconds(ex) {
    if (ex.duration > 0) return ex.duration;
    if (ex.reps > 0) return Math.max(10, ex.reps * 3);
    const match = ex.sets.match(/(\d+)组x(\d+)/);
    if (match) return parseInt(match[2]) * 3;
    return 45;
}
function formatTime(s) {
    const m = Math.floor(s/60), sec = s%60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

// ===== CUSTOM WORKOUT =====
function ensureCustomDay() {
    if (!PLAN.days[CUSTOM_DAY]) PLAN.days[CUSTOM_DAY] = { rounds: 1, exercises: [] };
}

function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[ch]);
}

function getExerciseLibrary() {
    if (!PLAN) return [];
    const byName = new Map();
    Object.entries(PLAN.days).forEach(([day, data]) => {
        if (day === CUSTOM_DAY) return;
        (data.exercises || []).forEach(ex => {
            if (ex.name && !byName.has(ex.name)) byName.set(ex.name, ex);
        });
    });
    return Array.from(byName.values()).sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
}

const EXERCISE_CATEGORY_ORDER = [
    '热身与活动', '核心与腰背', '下肢与臀腿', '背部与拉', '胸部与推',
    '肩部', '手臂', '全身', '拉伸与恢复', '休息', '其他'
];

function getExerciseCategory(ex) {
    const name = String(ex.name || '');
    const phase = String(ex.phase || '');
    if (phase === '休息' || /休息|放松/.test(name)) return '休息';
    if (/猫牛|猫驼|平板|鸟狗|死虫|腹|核心|躯干|腰部|舒腰|扭转|侧弯|婴儿式/.test(name)) return '核心与腰背';
    if (/深蹲|半蹲|浅蹲|臀|腿|髋|膝|踝|提踵|踏步|开合跳|弓步|下肢/.test(name)) return '下肢与臀腿';
    if (/划船|面拉|背阔|背部/.test(name)) return '背部与拉';
    if (/俯卧撑|卧推|飞鸟|推胸|胸部/.test(name)) return '胸部与推';
    if (/肩|侧平举|手臂画圈/.test(name)) return '肩部';
    if (/弯举|二头|三头|臂屈伸/.test(name)) return '手臂';
    if (/全身|四肢/.test(name)) return '全身';
    if (phase === '拉伸' || /拉伸|伸展/.test(name)) return '拉伸与恢复';
    if (phase === '热身') return '热身与活动';
    return '其他';
}

function getExerciseGroups(library = getExerciseLibrary()) {
    const groups = new Map(EXERCISE_CATEGORY_ORDER.map(category => [category, []]));
    library.forEach(ex => groups.get(getExerciseCategory(ex)).push(ex));
    return EXERCISE_CATEGORY_ORDER
        .map(category => ({ category, exercises: groups.get(category) }))
        .filter(group => group.exercises.length > 0);
}

function getSetsFromExercise(ex) {
    if (Number(ex.setsCount) > 0) return Math.floor(Number(ex.setsCount));
    const match = String(ex.sets || '').match(/(\d+)\s*(?:组|套)/);
    return match ? Number(match[1]) : 1;
}

function getRepsFromExercise(ex) {
    if (Number(ex.reps) > 0) return Number(ex.reps);
    const setText = String(ex.sets || '');
    const repMatches = Array.from(setText.matchAll(/(\d+)\s*次/g));
    if (repMatches.length > 0) return Number(repMatches[repMatches.length - 1][1]);
    if (Number(ex.duration) > 0) return 0;
    const numbers = setText.match(/\d+/g);
    return numbers ? Number(numbers[numbers.length - 1]) : 1;
}

function makeCustomDraft(ex) {
    const library = getExerciseLibrary();
    const inLibrary = library.some(item => item.name === ex.name);
    return {
        libraryName: inLibrary ? ex.name : '__custom__',
        name: ex.name || '',
        setsCount: getSetsFromExercise(ex),
        reps: getRepsFromExercise(ex),
        duration: Math.max(0, Number(ex.duration) || 0)
    };
}

function editCustomWorkout() {
    customDraft = getExercises().map(makeCustomDraft);
    customEditing = true;
    stopTimer(); timerSeconds = 0; currentSet = 1; exercisePhase = 'work';
    doneExercises.clear(); currentIndex = 0;
    renderExercises(); updateControls(); updateProgress();
}

function customAddExercise() {
    const first = getExerciseLibrary()[0];
    customDraft.push(first ? {
        libraryName: first.name,
        name: first.name,
        setsCount: getSetsFromExercise(first),
        reps: getRepsFromExercise(first),
        duration: Math.max(0, Number(first.duration) || 0)
    } : {
        libraryName: '__custom__', name: '', setsCount: 1, reps: 10, duration: 30
    });
    renderExercises();
}

function customRemoveExercise(index) {
    customDraft.splice(index, 1);
    renderExercises();
}

function customSelectExercise(index, name) {
    const item = customDraft[index];
    item.libraryName = name;
    if (name === '__custom__') {
        item.name = '';
    } else {
        const template = getExerciseLibrary().find(ex => ex.name === name);
        if (template) {
            item.name = template.name;
            item.setsCount = getSetsFromExercise(template);
            item.reps = getRepsFromExercise(template);
            item.duration = Math.max(0, Number(template.duration) || 0);
        }
    }
    renderExercises();
}

function customUpdateField(index, field, value) {
    if (!customDraft[index]) return;
    if (field === 'name') customDraft[index].name = value;
    else if (field === 'setsCount') customDraft[index][field] = Math.max(1, Math.floor(Number(value) || 1));
    else customDraft[index][field] = Math.max(0, Number(value) || 0);
}

function renderCustomBuilder(container) {
    if (customDraft.length === 0 && getExercises().length > 0) {
        customDraft = getExercises().map(makeCustomDraft);
    }
    const library = getExerciseLibrary();
    const wrapper = document.createElement('div');
    wrapper.className = 'custom-builder';
    const rows = customDraft.map((item, index) => {
        const options = getExerciseGroups(library).map(group => `
            <optgroup label="${escapeHTML(group.category)}">
                ${group.exercises.map(ex =>
                    `<option value="${escapeHTML(ex.name)}"${item.libraryName === ex.name ? ' selected' : ''}>${escapeHTML(ex.name)}</option>`
                ).join('')}
            </optgroup>`).join('');
        const customName = item.libraryName === '__custom__' ? `
            <div class="custom-field custom-name-field">
                <label>自定义动作名称</label>
                <input value="${escapeHTML(item.name)}" placeholder="输入动作名称"
                    oninput="customUpdateField(${index}, 'name', this.value)">
            </div>` : '';
        return `
            <div class="custom-row">
                <div class="custom-row-head">
                    <span class="custom-row-title">动作 ${index + 1}</span>
                    <button class="custom-remove" onclick="customRemoveExercise(${index})">删除</button>
                </div>
                <div class="custom-fields">
                    <div class="custom-field action-field">
                        <label>选择动作</label>
                        <select onchange="customSelectExercise(${index}, this.value)">
                            ${options}
                            <option value="__custom__"${item.libraryName === '__custom__' ? ' selected' : ''}>＋ 自定义动作</option>
                        </select>
                    </div>
                    <div class="custom-field">
                        <label>组数</label>
                        <input type="number" min="1" step="1" value="${item.setsCount}"
                            oninput="customUpdateField(${index}, 'setsCount', this.value)">
                    </div>
                    <div class="custom-field">
                        <label>次数</label>
                        <input type="number" min="0" step="1" value="${item.reps}"
                            oninput="customUpdateField(${index}, 'reps', this.value)">
                    </div>
                    <div class="custom-field">
                        <label>时长（秒）</label>
                        <input type="number" min="0" step="5" value="${item.duration}"
                            oninput="customUpdateField(${index}, 'duration', this.value)">
                    </div>
                </div>
                ${customName}
            </div>`;
    }).join('');
    const hasSaved = getExercises().length > 0;
    wrapper.innerHTML = `
        <div class="custom-intro">
            <h2>自定义训练</h2>
            <p>动作库已按训练部位分类。每个动作可设置组数、次数和倒计时时长；按次数训练时，时长可填 0。</p>
        </div>
        ${rows || '<div class="custom-empty">还没有动作，点击下方“添加动作”开始创建。</div>'}
        <div class="custom-actions">
            <button class="custom-secondary" onclick="customAddExercise()">＋ 添加动作</button>
            <button class="custom-primary" onclick="saveCustomWorkout()">保存并进入训练</button>
            ${hasSaved ? '<button class="custom-secondary" onclick="cancelCustomEdit()">取消修改</button>' : ''}
        </div>`;
    container.appendChild(wrapper);
}

function saveCustomWorkout() {
    if (customDraft.length === 0) { alert('请至少添加一个动作'); return; }
    const library = getExerciseLibrary();
    const exercises = [];
    for (const item of customDraft) {
        const name = String(item.name || '').trim();
        if (!name) { alert('请填写自定义动作名称'); return; }
        const template = item.libraryName === '__custom__'
            ? null
            : library.find(ex => ex.name === item.libraryName);
        const setsCount = Math.max(1, Math.floor(Number(item.setsCount) || 1));
        const reps = Math.max(0, Number(item.reps) || 0);
        const duration = Math.max(0, Number(item.duration) || 0);
        if (reps === 0 && duration === 0) {
            alert('「' + name + '」的次数和时长不能同时为 0');
            return;
        }
        const exercise = template ? JSON.parse(JSON.stringify(template)) : {
            phase: '正式', weight: '', rest: 30, groupRest: 30,
            tips: '按自己的节奏完成，保持动作稳定。', demo: ''
        };
        exercise.name = name;
        exercise.setsCount = setsCount;
        exercise.reps = reps;
        exercise.sets = reps > 0
            ? setsCount + '组x' + reps + '次'
            : setsCount + '组x' + duration + '秒';
        exercise.duration = duration;
        exercises.push(exercise);
    }
    PLAN.days[CUSTOM_DAY] = { rounds: 1, exercises };
    savePlan();
    customEditing = false; customDraft = [];
    currentIndex = 0; currentRound = 1; totalRounds = 1;
    timerSeconds = 0; currentSet = 1; doneExercises.clear();
    renderExercises(); updateControls(); updateProgress(); saveState();
}

function cancelCustomEdit() {
    customEditing = false; customDraft = [];
    renderExercises(); updateControls(); updateProgress();
}

// ===== INIT =====
async function init() {
    PLAN = loadPlan();
    if (!PLAN || (PLAN._version || 0) < PLAN_VERSION) {
        PLAN = await loadDefaultPlan();
        if (PLAN) { PLAN._version = PLAN_VERSION; savePlan(); }
    }
    if (!PLAN) {
        document.getElementById('exerciseList').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted)">⚠️ 无法加载训练计划，请导入一个计划文件</div>';
        return;
    }

    ensureCustomDay();
    applyPlanMeta();

    const restored = loadState();
    if (!restored || !PLAN.days[currentDay]) {
        currentDay = getDays()[0] || '';
        currentIndex = 0;
    }
    totalRounds = (PLAN.days[currentDay] && PLAN.days[currentDay].rounds) || 1;
    customEditing = currentDay === CUSTOM_DAY && getExercises().length === 0;

    renderTabs(); renderExercises(); updateControls(); updateProgress();
    if (restored) document.getElementById('sessionTimer').textContent = formatTime(sessionSeconds);
}

function applyPlanMeta() {
    if (!PLAN) return;
    document.querySelector('.header h1').textContent = '🏋️ ' + (PLAN.name || '训练计划');
    if (PLAN.notes) {
        document.getElementById('notesTable').innerHTML = PLAN.notes.map(n =>
            `<tr><td>${n.label}</td><td>${n.value}</td></tr>`
        ).join('');
    }
}

// ===== RENDER =====
function renderTabs() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = '';
    getDays().forEach(day => {
        const tab = document.createElement('div');
        tab.className = 'tab' + (day === currentDay ? ' active' : '');
        tab.textContent = day;
        tab.onclick = () => switchDay(day);
        bar.appendChild(tab);
    });
}

function switchDay(day) {
    currentDay = day;
    totalRounds = (PLAN.days[day] && PLAN.days[day].rounds) || 1;
    currentRound = 1; currentIndex = 0;
    stopTimer(); timerSeconds = 0; currentSet = 1; exercisePhase = 'work';
    doneExercises.clear();
    customEditing = day === CUSTOM_DAY && getExercises().length === 0;
    renderTabs(); renderExercises(); updateControls(); updateProgress(); saveState();
}

function renderExercises() {
    const list = document.getElementById('exerciseList');
    const exercises = getExercises();
    list.innerHTML = '';
    if (currentDay === CUSTOM_DAY && customEditing) {
        renderCustomBuilder(list);
        return;
    }
    if (currentDay === CUSTOM_DAY) {
        const toolbar = document.createElement('div');
        toolbar.className = 'custom-run-toolbar';
        toolbar.innerHTML = `<span>共 ${exercises.length} 个动作，可直接开始计时</span>
            <button class="custom-secondary" onclick="editCustomWorkout()">✏️ 修改动作</button>`;
        list.appendChild(toolbar);
    }
    exercises.forEach((ex, i) => {
        const done = doneExercises.has(i), active = i === currentIndex;
        const card = document.createElement('div');
        card.className = 'exercise-card' + (active ? ' active' : '') + (done ? ' done' : '');
        card.id = 'card-' + i;
        const timerDisplay = active ? formatTime(getInitialSeconds(ex)) : (done ? '✓' : '');
        const setInfo = active && totalSets > 1 ? `<div class="set-indicator">第${currentSet}组 / 共${totalSets}组</div>` : '';
        const roundInfo = active && totalRounds > 1 ? `<div class="set-indicator">🔄 第${currentRound}轮 / 共${totalRounds}轮</div>` : '';
        const demoLink = ex.demo ? `<a class="demo-link" href="${ex.demo}" target="_blank" rel="noopener">🎬 观看动作示范</a>` : '';
        card.innerHTML = `
            <div class="card-header" onclick="toggleExpand(${i})">
                <span class="phase-tag ${ex.phase}">${ex.phase}</span>
                <div class="card-title">
                    <div class="name">${ex.name}</div>
                    <div class="meta"><span>${ex.sets}</span>${ex.weight ? '<span>' + ex.weight + '</span>' : ''}</div>
                    ${setInfo}${roundInfo}
                </div>
                <div class="card-timer" id="timer-${i}">${timerDisplay}</div>
                <span class="expand-icon">▼</span>
            </div>
            <div class="card-detail"><div class="detail-content">
                ${ex.weight ? '<div class="weight-info">🏋️ ' + ex.weight + '</div>' : ''}
                <div class="tips">${ex.tips}</div>
                ${demoLink}
            </div></div>`;
        list.appendChild(card);
    });
    if (exercises[currentIndex]) {
        const card = document.getElementById('card-' + currentIndex);
        if (card) card.classList.add('expanded');
    }
    scrollToCurrent();
}

function toggleExpand(i) { document.getElementById('card-' + i).classList.toggle('expanded'); }

function updateControls() {
    const exercises = getExercises();
    const controlBar = document.querySelector('.control-bar');
    controlBar.classList.toggle('custom-hidden', currentDay === CUSTOM_DAY && customEditing);
    document.getElementById('btnPrev').disabled = currentIndex <= 0;
    document.getElementById('btnNext').disabled = currentIndex >= exercises.length - 1;
    const btn = document.getElementById('btnStart');
    btn.disabled = exercises.length === 0;
    if (timerRunning) { btn.textContent = '暂停'; btn.className = 'btn btn-start running'; }
    else { btn.textContent = doneExercises.has(currentIndex) ? '已完成 ✓' : '开始'; btn.className = 'btn btn-start'; }
}

function updateProgress() {
    const total = getExercises().length, done = doneExercises.size;
    document.getElementById('progressFill').style.width = (total > 0 ? Math.round(done/total*100) : 0) + '%';
}

// ===== TIMER =====
function toggleTimer() {
    if (timerRunning) { stopTimer(); beep(440, 80); }
    else { beep(880, 100); startTimer(); }
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    const ex = getExercises()[currentIndex];
    if (!ex) return;
    startSessionTimer();
    if (timerSeconds <= 0) {
        timerSeconds = getInitialSeconds(ex);
        const match = ex.sets.match(/(\d+)组/);
        totalSets = match ? parseInt(match[1]) : 1;
        if (currentSet < 1) currentSet = 1;
        exercisePhase = 'work';
    }
    timerRunning = true; updateControls();
    timerInterval = setInterval(() => {
        timerSeconds--; updateTimerDisplay();
        if (timerSeconds <= 3 && timerSeconds > 0) beep(660, 100);
        if (timerSeconds <= 0) handlePhaseComplete();
    }, 1000);
}

function handlePhaseComplete() {
    const ex = getExercises()[currentIndex];
    if (exercisePhase === 'work') {
        const match = ex.sets.match(/(\d+)组/);
        const hasMultipleSets = match && parseInt(match[1]) > 1;
        if (!hasMultipleSets) { completeExercise(ex); }
        else {
            if (currentSet < totalSets) {
                currentSet++;
                showRestOverlay(ex.rest || 30, `第${currentSet}组 / 共${totalSets}组`, () => {
                    timerSeconds = getInitialSeconds(ex); exercisePhase = 'work';
                    renderExercises(); startTimer();
                });
            } else { completeExercise(ex); }
        }
    }
}

function completeExercise(ex) {
    if (ex.phase === '休息' && totalRounds > 1) {
        if (currentRound < totalRounds) {
            currentRound++; beepSequence(3, 880);
            showRestOverlay(ex.duration || 60, `🔄 准备第${currentRound}轮 / 共${totalRounds}轮`, () => {
                const exercises = getExercises();
                const first = exercises.findIndex(e => e.phase === '循环');
                if (first >= 0) currentIndex = first;
                currentSet = 1; timerSeconds = 0;
                renderExercises(); updateControls(); updateProgress(); saveState();
                startTimer();
            });
            return;
        }
    }
    markDone(); beepSequence(2, 880);
    const exercises = getExercises();
    if (currentIndex < exercises.length - 1) {
        const nextEx = exercises[currentIndex + 1];
        if (ex.groupRest && ex.groupRest > 0) {
            showRestOverlay(ex.groupRest, `下一动作: ${nextEx.name}`, () => { navExercise(1); });
        } else { navExercise(1); }
    } else { stopTimer(); showComplete(); }
}

function showRestOverlay(seconds, labelText, callback) {
    stopTimer();
    const overlay = document.getElementById('restOverlay'), countdown = document.getElementById('restCountdown');
    overlay.classList.add('show'); restRemaining = seconds; countdown.textContent = restRemaining;
    restCallback = callback;
    overlay.querySelector('.rest-text').textContent = labelText || '组间休息';
    restInterval = setInterval(() => {
        restRemaining--; countdown.textContent = restRemaining;
        if (restRemaining <= 3 && restRemaining > 0) beep(660, 100);
        if (restRemaining <= 0) {
            clearInterval(restInterval); restInterval = null;
            overlay.classList.remove('show'); beep(880, 200);
            if (restCallback) restCallback();
        }
    }, 1000);
    saveState();
}

function adjustRest(delta) {
    if (restRemaining <= 0) return;
    restRemaining = Math.max(5, restRemaining + delta);
    document.getElementById('restCountdown').textContent = restRemaining;
}

function skipRest() {
    if (restInterval) clearInterval(restInterval); restInterval = null;
    document.getElementById('restOverlay').classList.remove('show'); beep(880, 200);
    if (restCallback) restCallback();
}

function markDone() {
    doneExercises.add(currentIndex);
    const card = document.getElementById('card-' + currentIndex);
    if (card) { card.classList.add('done'); card.querySelector('.card-timer').textContent = '✓'; }
    updateProgress(); saveState();
}

function stopTimer() { clearInterval(timerInterval); timerRunning = false; updateControls(); }

function updateTimerDisplay() {
    const el = document.getElementById('timer-' + currentIndex);
    if (el) { el.textContent = formatTime(timerSeconds); el.className = 'card-timer counting'; }
}

function navExercise(dir, autoStart) {
    stopTimer(); timerSeconds = 0; currentSet = 1; exercisePhase = 'work';
    const exercises = getExercises();
    currentIndex = Math.max(0, Math.min(exercises.length - 1, currentIndex + dir));
    renderExercises(); updateControls(); saveState();
    if (autoStart !== false) startTimer();
}

function scrollToCurrent() {
    const card = document.getElementById('card-' + currentIndex);
    if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
}

function startSessionTimer() {
    if (sessionInterval) return;
    sessionInterval = setInterval(() => {
        sessionSeconds++;
        document.getElementById('sessionTimer').textContent = formatTime(sessionSeconds);
        if (sessionSeconds % 30 === 0) saveState();
    }, 1000);
}

function stopSessionTimer() {
    if (sessionInterval) clearInterval(sessionInterval);
    sessionInterval = null;
}

function resetAll() {
    stopTimer(); stopSessionTimer();
    timerSeconds = 0; currentSet = 1; exercisePhase = 'work';
    currentRound = 1; doneExercises.clear(); sessionSeconds = 0; currentIndex = 0;
    document.getElementById('sessionTimer').textContent = formatTime(sessionSeconds);
    renderExercises(); updateControls(); updateProgress(); clearState();
}

// ===== MODALS =====
function toggleModal(id) { document.getElementById(id).classList.toggle('show'); }

function getLocalISODate(date = new Date()) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function toISODate(value) {
    const text = String(value || '');
    const match = text.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
    if (match) return `${match[1]}-${String(match[2]).padStart(2, '0')}-${String(match[3]).padStart(2, '0')}`;
    const parsed = new Date(value);
    return Number.isNaN(parsed.getTime()) ? '' : getLocalISODate(parsed);
}

function getChineseWeekday(isoDate) {
    if (!isoDate) return '';
    const date = new Date(isoDate + 'T00:00:00');
    return ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
}

function parseDurationMinutes(duration) {
    const parts = String(duration || '').split(':').map(Number);
    if (parts.length !== 2 || parts.some(Number.isNaN)) return null;
    return Math.round((parts[0] + parts[1] / 60) * 10) / 10;
}

function readOptionalNumber(id) {
    const value = document.getElementById(id).value;
    if (value === '') return null;
    const number = Number(value);
    return Number.isFinite(number) ? number : null;
}

function getCompletedTrainingContent() {
    const exercises = getExercises();
    const completed = exercises.filter((ex, index) => doneExercises.has(index) && ex.phase !== '休息');
    const source = completed.length > 0 ? completed : exercises.filter(ex => ex.phase !== '休息');
    return source.map(ex => ex.name + (ex.sets ? ex.sets : '')).join('；');
}

function normalizeLog(log) {
    const date = toISODate(log.date || log.createdAt);
    const count = Number(log.count) || 0;
    return {
        date,
        weekday: log.weekday || getChineseWeekday(date),
        dayType: log.dayType || log.day || '',
        trainingContent: log.trainingContent || (log.day ? `${log.day}（完成${count}个动作）` : ''),
        plannedMinutes: Number.isFinite(Number(log.plannedMinutes)) && log.plannedMinutes !== null && log.plannedMinutes !== ''
            ? Number(log.plannedMinutes) : null,
        actualMinutes: Number.isFinite(Number(log.actualMinutes)) && log.actualMinutes !== null && log.actualMinutes !== ''
            ? Number(log.actualMinutes) : parseDurationMinutes(log.duration),
        steps: Number.isFinite(Number(log.steps)) && log.steps !== null && log.steps !== '' ? Number(log.steps) : null,
        cyclingKm: Number.isFinite(Number(log.cyclingKm)) && log.cyclingKm !== null && log.cyclingKm !== ''
            ? Number(log.cyclingKm) : null,
        completion: log.completion || '已完成',
        fatigue: log.fatigue || '',
        sleep: log.sleep || '',
        rir: log.rir || '',
        feeling: log.feeling || '',
        notes: log.notes || log.text || '',
        duration: log.duration || formatTime(Math.round((Number(log.actualMinutes) || 0) * 60)),
        count
    };
}

function showComplete() {
    stopSessionTimer();
    document.getElementById('completeDuration').textContent = formatTime(sessionSeconds);
    document.getElementById('completeCount').textContent = doneExercises.size;
    document.getElementById('completeDayType').value = currentDay;
    document.getElementById('completePlannedMinutes').value = '';
    document.getElementById('completeSteps').value = '';
    document.getElementById('completeCyclingKm').value = '';
    document.getElementById('completeStatus').value = '已完成';
    document.getElementById('completeFatigue').value = '';
    document.getElementById('completeSleep').value = '';
    document.getElementById('completeRir').value = '';
    document.getElementById('completeFeeling').value = '';
    document.getElementById('completeLog').value = '';
    beepSequence(5, 1047); toggleModal('completeModal');
}

async function saveLogAndClose() {
    const now = new Date();
    const date = getLocalISODate(now);
    const feeling = document.getElementById('completeFeeling').value.trim();
    const notes = document.getElementById('completeLog').value.trim();
    await addLog({
        schemaVersion: 2,
        sessionId: globalThis.crypto && crypto.randomUUID
            ? crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        date,
        createdAt: now.toISOString(),
        weekday: getChineseWeekday(date),
        dayType: document.getElementById('completeDayType').value.trim() || currentDay,
        trainingContent: getCompletedTrainingContent(),
        plannedMinutes: readOptionalNumber('completePlannedMinutes'),
        actualMinutes: Math.round(sessionSeconds / 6) / 10,
        steps: readOptionalNumber('completeSteps'),
        cyclingKm: readOptionalNumber('completeCyclingKm'),
        completion: document.getElementById('completeStatus').value,
        fatigue: document.getElementById('completeFatigue').value,
        sleep: document.getElementById('completeSleep').value,
        rir: document.getElementById('completeRir').value.trim(),
        feeling,
        notes,
        day: currentDay,
        duration: formatTime(sessionSeconds),
        count: doneExercises.size,
        text: notes || feeling
    });
    toggleModal('completeModal'); resetAll();
}

async function openLog() {
    const logs = await getLogs();
    const container = document.getElementById('logEntries');
    container.innerHTML = logs.length === 0 ? '<div class="log-empty">暂无训练日志</div>' :
        logs.map(raw => {
            const l = normalizeLog(raw);
            const metrics = [
                l.fatigue ? `疲劳 ${l.fatigue}/5` : '',
                l.sleep ? `睡眠 ${l.sleep}/5` : '',
                l.rir ? `RIR ${l.rir}` : '',
                l.steps !== null ? `${l.steps}步` : ''
            ].filter(Boolean).join(' · ');
            return `<div class="log-entry">
                <div class="log-date">${escapeHTML(l.date)} ${escapeHTML(l.weekday)}</div>
                <div class="log-day">${escapeHTML(l.dayType)} · ${escapeHTML(l.duration)} · ${l.count}个动作</div>
                <div class="log-text">${escapeHTML(l.trainingContent || '(未记录训练内容)')}</div>
                ${l.feeling ? `<div class="log-text">感受：${escapeHTML(l.feeling)}</div>` : ''}
                ${l.notes ? `<div class="log-text">备注：${escapeHTML(l.notes)}</div>` : ''}
                ${metrics ? `<div class="log-meta">${escapeHTML(metrics)}</div>` : ''}
            </div>`;
        }).join('');
    drawTrendChart(logs);
    toggleModal('logModal');
}

function drawTrendChart(logs) {
    const canvas = document.getElementById('trendChart');
    const empty = document.getElementById('trendEmpty');
    if (!canvas || logs.length < 2) {
        if (empty) empty.style.display = 'block';
        return;
    }
    if (empty) empty.style.display = 'none';

    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.clientWidth;
    const H = canvas.clientHeight || 200;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);

    const data = logs.slice(0, 14).reverse();

    const durations = data.map(l => {
        const parts = (l.duration || '00:00').split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    });
    const counts = data.map(l => l.count || 0);

    const maxDur = Math.max(...durations, 1);
    const maxCnt = Math.max(...counts, 1);
    const maxY = Math.max(maxDur, maxCnt);

    const pad = { top: 20, right: 20, bottom: 40, left: 40 };
    const pw = W - pad.left - pad.right;
    const ph = H - pad.top - pad.bottom;

    ctx.fillStyle = '#141210';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#252320';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = pad.top + (ph / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
        ctx.fillStyle = '#5c554a';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxY - (maxY/4)*i), pad.left - 6, y + 3);
    }

    ctx.textAlign = 'center';
    const step = data.length > 7 ? Math.ceil(data.length / 7) : 1;
    data.forEach((l, i) => {
        if (i % step === 0 || i === data.length - 1) {
            const x = pad.left + (pw / (data.length - 1 || 1)) * i;
            ctx.fillStyle = '#5c554a';
            ctx.fillText(l.date.slice(5, 10), x, H - pad.bottom + 16);
        }
    });

    function drawLine(values, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        values.forEach((v, i) => {
            const x = pad.left + (pw / (data.length - 1 || 1)) * i;
            const y = pad.top + ph - (v / maxY) * ph;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
        values.forEach((v, i) => {
            const x = pad.left + (pw / (data.length - 1 || 1)) * i;
            const y = pad.top + ph - (v / maxY) * ph;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    drawLine(durations, '#7aadbd');
    drawLine(counts, '#d4a574');
}

function joinUnique(values) {
    return Array.from(new Set(values.filter(Boolean))).join('；');
}

function sumOptional(values) {
    const numbers = values.filter(value => value !== null && value !== '' && Number.isFinite(Number(value)));
    if (numbers.length === 0) return null;
    return Math.round(numbers.reduce((sum, value) => sum + Number(value), 0) * 10) / 10;
}

function mergeLogsByDate(logs) {
    const grouped = new Map();
    logs.map(normalizeLog).filter(log => log.date).forEach(log => {
        if (!grouped.has(log.date)) grouped.set(log.date, []);
        grouped.get(log.date).push(log);
    });
    return Array.from(grouped.entries()).sort(([a], [b]) => a.localeCompare(b)).map(([date, items]) => ({
        date,
        weekday: items[0].weekday || getChineseWeekday(date),
        dayType: joinUnique(items.map(item => item.dayType)),
        trainingContent: joinUnique(items.map(item => item.trainingContent)),
        plannedMinutes: sumOptional(items.map(item => item.plannedMinutes)),
        actualMinutes: sumOptional(items.map(item => item.actualMinutes)),
        steps: [...items].reverse().find(item => item.steps !== null)?.steps ?? null,
        cyclingKm: sumOptional(items.map(item => item.cyclingKm)),
        completion: items.every(item => item.completion === '已完成') ? '已完成' : '部分完成',
        fatigue: [...items].reverse().find(item => item.fatigue)?.fatigue || '',
        sleep: [...items].reverse().find(item => item.sleep)?.sleep || '',
        rir: joinUnique(items.map(item => item.rir)),
        feeling: joinUnique(items.map(item => item.feeling)),
        notes: joinUnique(items.map(item => item.notes))
    }));
}

function csvEscape(value) {
    if (value === null || value === undefined) return '';
    const text = String(value);
    return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
}

function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
        a.remove();
        URL.revokeObjectURL(url);
    }, 60000);
}

async function exportLogs() {
    const logs = await getLogs();
    if (logs.length === 0) { alert('暂无训练日志可导出'); return; }
    const headers = [
        '日期', '星期', '日类型', '训练内容', '计划时长(分钟)', '实际时长(分钟)',
        '步数', '骑行公里', '完成度', '疲劳1–5', '睡眠1–5', 'RIR/主观余力',
        '训练后总体感受', '备注'
    ];
    const rows = mergeLogsByDate(logs).map(log => [
        log.date, log.weekday, log.dayType, log.trainingContent, log.plannedMinutes,
        log.actualMinutes, log.steps, log.cyclingKm, log.completion, log.fatigue,
        log.sleep, log.rir, log.feeling, log.notes
    ]);
    const csv = [headers, ...rows].map(row => row.map(csvEscape).join(',')).join('\r\n');
    downloadBlob(
        new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'}),
        '训练日志-' + getLocalISODate() + '.csv'
    );
}

async function exportLogsBackup() {
    const logs = await getLogs();
    const blob = new Blob([JSON.stringify(logs, null, 2)], {type: 'application/json'});
    downloadBlob(blob, 'training-logs-backup-' + getLocalISODate() + '.json');
}

async function importLogsFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        try {
            const logs = JSON.parse(text);
            if (!Array.isArray(logs)) throw new Error('Invalid format');
            const d = await openDB();
            const tx = d.transaction('logs', 'readwrite');
            const store = tx.objectStore('logs');
            for (const l of logs) store.add(l);
            await new Promise(r => { tx.oncomplete = r; });
            alert('已导入 ' + logs.length + ' 条日志');
        } catch(err) { alert('导入失败：' + err.message); }
    };
    input.click();
}

// ===== IMPORT / EXPORT =====
function exportPlan() {
    if (!PLAN) return;
    const blob = new Blob([JSON.stringify(PLAN, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'workout-plan.json';
    a.click(); URL.revokeObjectURL(a.href);
}

function importPlan() { document.getElementById('importFile').click(); }

function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
        try {
            const data = JSON.parse(reader.result);
            if (!data.days) throw new Error('Invalid plan format');
            data._version = PLAN_VERSION;
            PLAN = data; ensureCustomDay(); savePlan(); applyPlanMeta();
            currentDay = getDays()[0] || ''; currentIndex = 0; currentRound = 1;
            totalRounds = (PLAN.days[currentDay] && PLAN.days[currentDay].rounds) || 1;
            doneExercises.clear(); resetAll();
            renderTabs(); renderExercises(); updateControls(); updateProgress();
        } catch(err) { alert('导入失败：' + err.message); }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ===== EDITOR =====
let editorData = null;

function openEditor() {
    if (!PLAN) return;
    editorData = JSON.parse(JSON.stringify(PLAN));
    document.getElementById('editorPlanName').value = editorData.name || '';
    renderEditorDays();
    toggleModal('editorModal');
}

function getEditorDays() {
    return Object.keys(editorData.days).filter(day => day !== CUSTOM_DAY);
}

function renderEditorDays() {
    const container = document.getElementById('editorDayList');
    const days = getEditorDays();
    container.innerHTML = days.map((day, di) => `
        <div class="day-item">
            <div class="day-header">
                <span class="day-name">${day}</span>
                <div>
                    <button class="small-btn" onclick="editorEditDay(${di})">编辑动作</button>
                    <button class="small-btn danger" onclick="editorDeleteDay(${di})">删除</button>
                </div>
            </div>
            <div style="font-size:.78rem;color:var(--text-muted)">${editorData.days[day].exercises.length}个动作 · ${editorData.days[day].rounds}轮</div>
        </div>`).join('');
}

function editorAddDay() {
    const name = prompt('训练日名称（如"周五 核心日"）：');
    if (!name) return;
    if (name === CUSTOM_DAY) { alert('“自定义训练”是系统页面，请换一个名称'); return; }
    editorData.days[name] = { rounds: 1, exercises: [] };
    renderEditorDays();
}

function editorDeleteDay(di) {
    const days = getEditorDays();
    if (days.length <= 1) { alert('至少保留一个训练日'); return; }
    if (!confirm('确定删除「' + days[di] + '」？')) return;
    delete editorData.days[days[di]];
    renderEditorDays();
}

function editorEditDay(di) {
    const dayKey = getEditorDays()[di];
    const dayData = editorData.days[dayKey];
    const json = JSON.stringify(dayData, null, 2);
    const newJson = prompt(`编辑「${dayKey}」的JSON数据：\n（修改后粘贴回来）`, json);
    if (!newJson) return;
    try {
        editorData.days[dayKey] = JSON.parse(newJson);
        renderEditorDays();
    } catch(e) { alert('JSON格式错误：' + e.message); }
}

function saveEditor() {
    editorData.name = document.getElementById('editorPlanName').value.trim() || '训练计划';
    PLAN = editorData; ensureCustomDay(); savePlan(); applyPlanMeta();
    if (!PLAN.days[currentDay]) { currentDay = getDays()[0] || ''; currentIndex = 0; }
    totalRounds = (PLAN.days[currentDay] && PLAN.days[currentDay].rounds) || 1;
    renderTabs(); renderExercises(); updateControls(); updateProgress();
    toggleModal('editorModal');
}

// ===== PWA =====
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('SW registered');
            reg.update();
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        window.location.reload();
                    }
                });
            });
        }).catch(() => {});
    });
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const hint = document.getElementById('installHint');
    if (hint) hint.classList.add('show');
});

function installPWA() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
            document.getElementById('installHint').classList.remove('show');
        });
    }
}

// ===== START =====
init();
</script>

<div class="install-hint" id="installHint" onclick="installPWA()">📲 添加到主屏幕，离线也能用</div>
</body>
